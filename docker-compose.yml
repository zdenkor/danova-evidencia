version: '3.8'

services:
  danova-evidencia:
    build: .
    container_name: danova-evidencia
    ports:
      - "${FLASK_PORT:-8080}:8080"
    environment:
      - DB_PATH=/data/danova_evidencia.db
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8080
    volumes:
      - danova-evidencia-data:/data
    restart: unless-stopped

volumes:
  danova-evidencia-data:
    driver: local
