name: Build Portable ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Extract version from tag
      id: get_version
      run: |
        $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
    
    - name: Create portable package
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $buildDir = "build\portable"
        $zipName = "danova-evidencia-portable-$version.zip"
        
        # Create build directory
        New-Item -ItemType Directory -Force -Path $buildDir
        
        # Copy files
        Copy-Item *.py $buildDir\
        Copy-Item -Recurse templates $buildDir\
        Copy-Item -Recurse static $buildDir\
        Copy-Item -Recurse migrations $buildDir\
        Copy-Item requirements.txt $buildDir\
        Copy-Item start.bat $buildDir\
        Copy-Item README.md $buildDir\
        Copy-Item VERSION.md $buildDir\
        Copy-Item DOCKER.md $buildDir\
        Copy-Item Dockerfile $buildDir\
        Copy-Item docker-compose.yml $buildDir\
        
        # Create virtual environment
        cd $buildDir
        python -m venv .venv
        .venv\Scripts\pip install -r requirements.txt
        cd ..\..
        
        # Create ZIP
        Compress-Archive -Path "$buildDir\*" -DestinationPath $zipName -Force
        
        Write-Host "Created: $zipName"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: portable-zip
        path: danova-evidencia-portable-*.zip
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: danova-evidencia-portable-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
