{% extends "base.html" %}

{% block title %}Pridať zásobu - Daňová evidencia{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Pridať zásobu</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Názov zásoby *</label>
                            <input type="text" name="nazov" class="form-control" required
                                   placeholder="napr. Kancelársky papier A4">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Jednotka</label>
                            <select name="jednotka" class="form-select">
                                <option value="ks">ks (kusy)</option>
                                <option value="kg">kg (kilogramy)</option>
                                <option value="l">l (litre)</option>
                                <option value="m">m (metre)</option>
                                <option value="m2">m² (štvorcové metre)</option>
                                <option value="bal">bal (balenia)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Dátum obstarania *</label>
                            <input type="date" name="datum_obstarania" class="form-control" required
                                   value="{{ aktualny_datum }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Množstvo *</label>
                            <input type="number" name="mnozstvo" class="form-control" required
                                   step="0.01" min="0" placeholder="0.00">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Jednotková cena (bez DPH) *</label>
                            <div class="input-group">
                                <input type="number" name="jednotkova_cena" class="form-control" required
                                       step="0.01" min="0" placeholder="0.00">
                                <span class="input-group-text">€</span>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Poznámka</label>
                        <textarea name="poznamka" class="form-control" rows="2"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-info text-white">
                            <i class="bi bi-check-circle"></i> Uložiť zásobu
                        </button>
                        <a href="{{ url_for('zasoby') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> Zrušiť
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
