{% extends "base.html" %}

{% block title %}Pridať pohľadávku - Daňová evidencia{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Pridať novú pohľadávku</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Číslo faktúry *</label>
                            <input type="text" name="cislo_faktury" class="form-control" required
                                   placeholder="napr. 2026001">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Odberateľ *</label>
                            <input type="text" name="odberatel" class="form-control" required
                                   placeholder="Názov odberateľa">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">IČO odberateľa</label>
                            <input type="text" name="ico_odberatela" class="form-control"
                                   placeholder="12345678">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mena</label>
                            <select name="mena" class="form-select">
                                <option value="EUR" selected>EUR</option>
                                <option value="CZK">CZK</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Dátum vystavenia *</label>
                            <input type="date" name="datum_vystavenia" class="form-control" required
                                   value="{{ aktualny_datum }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Dátum splatnosti *</label>
                            <input type="date" name="datum_splatnosti" class="form-control" required
                                   value="{{ aktualny_datum }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Suma *</label>
                            <div class="input-group">
                                <input type="number" name="suma" class="form-control" required
                                       step="0.01" min="0" placeholder="0.00">
                                <span class="input-group-text">€</span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">DPH</label>
                            <div class="input-group">
                                <input type="number" name="dph" class="form-control"
                                       step="0.01" min="0" value="0">
                                <span class="input-group-text">€</span>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Poznámka</label>
                        <textarea name="poznamka" class="form-control" rows="2"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-circle"></i> Uložiť pohľadávku
                        </button>
                        <a href="{{ url_for('pohladavky') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i> Zrušiť
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
